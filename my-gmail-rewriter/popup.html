<!DOCTYPE html>
<html>
<head>
    <title>Gmail Email Rewriter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 280px;
            padding: 16px;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            margin: 0 0 16px 0;
            color: #333;
            font-size: 18px;
            text-align: center;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .toggle-label {
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background-color: #ccc;
            border-radius: 13px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .toggle-switch.active {
            background-color: #4CAF50;
        }
        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active .toggle-slider {
            transform: translateX(24px);
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
        }
        .status.off {
            background-color: #f5f5f5;
            color: #666;
        }
        .status.on {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Email Rewriter</h2>

        <div class="toggle-container">
            <span class="toggle-label">Show Rewrite</span>
            <div class="toggle-switch" id="toggleSwitch">
                <div class="toggle-slider"></div>
            </div>
        </div>

        <div class="status off" id="statusMessage">Display is off</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
